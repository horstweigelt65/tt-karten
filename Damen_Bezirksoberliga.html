        <script>
        var groupMarkerLabels = {"Alle (7)": [{"id": "marker_0", "label": "TV Rottenburg", "rawGroup": "Alle"}, {"id": "marker_1", "label": "TSV Kiebingen", "rawGroup": "Alle"}, {"id": "marker_2", "label": "TTC Reutlingen", "rawGroup": "Alle"}, {"id": "marker_3", "label": "SV Rosenfeld", "rawGroup": "Alle"}, {"id": "marker_4", "label": "TSV Eningen", "rawGroup": "Alle"}, {"id": "marker_5", "label": "TV Derendingen", "rawGroup": "Alle"}, {"id": "marker_6", "label": "TSV Betzingen II", "rawGroup": "Alle"}]};
        var colorMapping = {"Alle": "blue"};
        var bundlesData = {"bundle_0": [{"id": "marker_0", "label": "TV Rottenburg", "initialGroup": "Alle"}], "bundle_1": [{"id": "marker_1", "label": "TSV Kiebingen", "initialGroup": "Alle"}], "bundle_2": [{"id": "marker_2", "label": "TTC Reutlingen", "initialGroup": "Alle"}], "bundle_3": [{"id": "marker_3", "label": "SV Rosenfeld", "initialGroup": "Alle"}], "bundle_4": [{"id": "marker_4", "label": "TSV Eningen", "initialGroup": "Alle"}], "bundle_5": [{"id": "marker_5", "label": "TV Derendingen", "initialGroup": "Alle"}], "bundle_6": [{"id": "marker_6", "label": "TSV Betzingen II", "initialGroup": "Alle"}]}; 
        var rawToDisplayMapping = {"Alle": "Alle (7)"};

        function refreshGroupMarkerList(groupDisplayName, visible) {
            var list = document.querySelector('ul.group-marker-list[data-group="' + groupDisplayName + '"]');
            if (!list) return;
            var dataItems = groupMarkerLabels[groupDisplayName] || [];
            list.innerHTML = dataItems.map(function(item) {
                return '<li style="margin:2px 0; font-size:12px;">' + item.label + '</li>';
            }).join('');
            list.style.display = visible ? 'block' : 'none';
        }

        function updateMapElementsState() {
            var dynamicCounts = {};
            Object.keys(rawToDisplayMapping).forEach(function(key) {
                dynamicCounts[key] = 0;
            });

            Object.keys(bundlesData).forEach(function(bId) {
                bundlesData[bId].forEach(function(t) {
                    if (dynamicCounts[t.initialGroup] !== undefined) {
                        dynamicCounts[t.initialGroup]++;
                    }
                });
            });

            Object.keys(dynamicCounts).forEach(function(rawKey) {
                var count = dynamicCounts[rawKey];
                var baseName = (rawKey === 'Alle') ? 'Alle' : 'Gruppe ' + rawKey;
                var newDisplayNameWithCount = baseName + ' (' + count + ')';
                
                var liElement = document.querySelector('li[data-raw-group="' + rawKey + '"]');
                if (liElement) {
                    var textSpan = liElement.querySelector('.legend-text-label');
                    if (textSpan) textSpan.textContent = newDisplayNameWithCount;
                    
                    var cb = liElement.querySelector('.group-toggle');
                    if (cb) cb.setAttribute('data-group', newDisplayNameWithCount);
                    
                    var subList = liElement.querySelector('.group-marker-list');
                    if (subList) {
                        var oldGroupAttr = subList.getAttribute('data-group');
                        if (oldGroupAttr !== newDisplayNameWithCount) {
                            if (groupMarkerLabels[oldGroupAttr]) {
                                groupMarkerLabels[newDisplayNameWithCount] = groupMarkerLabels[oldGroupAttr];
                                delete groupMarkerLabels[oldGroupAttr];
                            }
                            subList.setAttribute('data-group', newDisplayNameWithCount);
                        }
                    }
                    rawToDisplayMapping[rawKey] = newDisplayNameWithCount;
                }
            });

            var activeGroups = {};
            document.querySelectorAll('.group-toggle').forEach(function(cb) {
                var gDisplayName = cb.getAttribute('data-group');
                var rawKey = Object.keys(rawToDisplayMapping).find(function(key) {
                    return rawToDisplayMapping[key] === gDisplayName;
                });
                if (rawKey) {
                    activeGroups[rawKey] = cb.checked;
                }
            });

            // Zustand des neuen globalen Toggles auslesen
            var labelsToggle = document.getElementById('global-labels-toggle');
            var showLabelsGlobal = labelsToggle ? labelsToggle.checked : true;

            Object.keys(bundlesData).forEach(function(bId) {
                var teamsInBundle = bundlesData[bId];
                var visibleTeamsCount = 0;
                
                teamsInBundle.forEach(function(t) {
                    var isTeamGroupActive = activeGroups[t.initialGroup] !== false; 
                    
                    var targetRows = document.querySelectorAll('.team-row-' + bId + '[data-marker-id="' + t.id + '"]');
                    targetRows.forEach(function(row) {
                        if (isTeamGroupActive) {
                            row.style.display = 'flex';
                            visibleTeamsCount++;
                            
                            // Text-Label ein- oder ausblenden, je nach globalem Toggle
                            var lbl = row.querySelector('.team-label-box');
                            if (lbl) {
                                lbl.style.display = showLabelsGlobal ? 'block' : 'none';
                            }
                        } else {
                            row.style.display = 'none';
                        }
                    });

                    var targetDots = document.querySelectorAll('#dot_' + t.id);
                    targetDots.forEach(function(dot) {
                        dot.style.backgroundColor = colorMapping[t.initialGroup];
                    });
                });

                var container = document.getElementById('container_' + bId);
                if (container) {
                    var leafletMarkerIcon = container.closest('.leaflet-marker-icon');
                    if (leafletMarkerIcon) {
                        leafletMarkerIcon.style.display = (visibleTeamsCount > 0) ? 'block' : 'none';
                    }
                    var leafletPopup = container.closest('.leaflet-popup');
                    if (leafletPopup && visibleTeamsCount === 0) {
                        leafletPopup.style.display = 'none';
                    }
                }
            });
        }

        function refreshAllGroupMarkerLists() {
            Object.keys(groupMarkerLabels).forEach(function(gDisplayName) {
                var cb = document.querySelector('.group-toggle[data-group="' + gDisplayName + '"]');
                refreshGroupMarkerList(gDisplayName, cb ? cb.checked : true);
            });
        }

        window.moveMarkerGroup = function(markerId, targetRawGroup, bundleId) {
            if (bundlesData[bundleId]) {
                var teamObj = bundlesData[bundleId].find(function(t) { return t.id === markerId; });
                if (teamObj) {
                    teamObj.initialGroup = targetRawGroup;
                }
            }

            var matchedItem = null;
            Object.keys(groupMarkerLabels).forEach(function(gName) {
                var arr = groupMarkerLabels[gName];
                var foundIdx = arr.findIndex(function(i) { return i.id === markerId; });
                if (foundIdx !== -1) {
                    matchedItem = arr.splice(foundIdx, 1)[0];
                }
            });

            if (matchedItem) {
                matchedItem.rawGroup = targetRawGroup;
                var targetDisplayName = rawToDisplayMapping[targetRawGroup];
                if (!groupMarkerLabels[targetDisplayName]) groupMarkerLabels[targetDisplayName] = [];
                groupMarkerLabels[targetDisplayName].push(matchedItem);
            }

            updateMapElementsState();
            refreshAllGroupMarkerLists();
        };

        setTimeout(function() {
            try {
                document.getElementById('map_legend').addEventListener('change', function(e) {
                    // Fall 1: Eine Gruppen-Checkbox wurde geklickt
                    if (e.target && e.target.classList.contains('group-toggle')) {
                        var target = e.target.getAttribute('data-group');
                        refreshGroupMarkerList(target, e.target.checked);
                        updateMapElementsState();
                    }
                    // Fall 2: Der globale Label-Toggle wurde geklickt
                    if (e.target && e.target.id === 'global-labels-toggle') {
                        updateMapElementsState();
                    }
                });

                updateMapElementsState();
                refreshAllGroupMarkerLists();
                
                setInterval(updateMapElementsState, 500);

            } catch (e) { console.log('Init error:', e); }
        }, 1000);
        </script>
