        <script>
        var groupMarkerLabels = {"Gruppe 1": ["TSV Burladingen II", "SV Rosenfeld", "TSV Gammertingen", "TSV Gomaringen III", "TSV Burladingen", "TTC Grosselfingen II", "TTC Benzingen", "TTC Bitz", "TTC Tailfingen-Margrethausen III"], "Gruppe 2": ["TV Derendingen III", "SV Tübingen II", "VfL Dettenhausen", "SV Weilheim II", "TTC Ofterdingen", "TSV Lustnau", "TSV Gomaringen IV", "TSV Gomaringen II", "SV Wendelsheim"], "Gruppe 3": ["TSV Sondelfingen II", "TSV Riederich", "TV Neuhausen", "TSV Grafenberg", "TSV Betzingen III", "TTC Reutlingen III", "SV Rommelsbach II", "TSV Sickenhausen", "TTC Reutlingen II"], "Gruppe 4": ["SSV Bernloch", "VfL Pfullingen", "SV Würtingen", "TTC Lichtenstein", "TSV Dettingen II", "TSG Upfingen", "SV Bronnen", "TSV Steinhilben", "TTG Sonnenbühl II"]};

        function refreshGroupMarkerList(groupName, visible) {
            var list = document.querySelector('ul.group-marker-list[data-group="' + groupName + '"]');
            if (!list) return;
            var labels = groupMarkerLabels[groupName] || [];
            list.innerHTML = labels.map(function(name) {
                return '<li style="margin:2px 0; font-size:12px;">' + name + '</li>';
            }).join('');
            list.style.display = visible ? 'block' : 'none';
        }

        function refreshAllGroupMarkerLists() {
            document.querySelectorAll('.group-toggle').forEach(function(cb) {
                var groupName = cb.getAttribute('data-group');
                refreshGroupMarkerList(groupName, cb.checked);
            });
        }

        setTimeout(function() {
            try {
                var overlayMap = {};
                document.querySelectorAll('.leaflet-control-layers-overlays label').forEach(function(label) {
                    var input = label.querySelector('input[type=checkbox]');
                    if (!input) return;
                    var text = label.textContent.trim();
                    overlayMap[text] = input;
                });

                document.querySelectorAll('.group-toggle').forEach(function(cb) {
                    var target = cb.getAttribute('data-group');
                    cb.addEventListener('change', function() {
                        var overlayInput = overlayMap[target];
                        if (overlayInput && overlayInput.checked !== cb.checked) {
                            overlayInput.click();
                        }
                        refreshGroupMarkerList(target, cb.checked);
                    });
                });

                refreshAllGroupMarkerLists();
            } catch (e) { console && console.log && console.log('group legend init error', e); }
        }, 1000);
        // Also refresh on window load in case the DOM/map initialization is slower
        if (window && window.addEventListener) {
            window.addEventListener('load', function() {
                try { refreshAllGroupMarkerLists(); } catch(e){}
            });
        }
        </script>
